name: Weekly BTC-USDT Strategy Monitor

on:
  schedule:
    # Run every Sunday at 13:00 UTC
    - cron: '0 13 * * 0'
  workflow_dispatch: # Allows manual triggers from GitHub UI

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # caching pip dependencies
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance
        
    - name: Run Monitor and Generate Dashboard
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scripts/notify_signal.py
      
    - name: Commit and Push Updated Dashboard
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add output_btc/dashboard.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update weekly dashboard [skip ci]" && git push)
